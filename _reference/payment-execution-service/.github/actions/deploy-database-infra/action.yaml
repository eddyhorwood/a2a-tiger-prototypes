name: "Deploy Database Infrastructure"
description: "Deploys the database infrastructure to the target environment"

inputs:
  environment:
    description: "Environment to deploy the infrastructure to"
    required: true
  aws_region:
    description: "AWS region"
    required: true
  oidc_role:
    description: "OIDC role ARN"
    required: true
  target_role:
    description: "Target role ARN"
    required: true
  working_dir:
    description: "Working directory for Terraform"
    required: false
    default: "./projects/database/infra/terraform"
  deploy_track_token: 
    description: "Token for publishing deploy track results"
    required: true
  component_uuid:
    description: "Component UUID for DeployTrack integration"
    required: true
  

outputs:
  server_endpoint:
    description: "The endpoint of the database server cluster"
    value: ${{ steps.set_output.outputs.server_endpoint }}

runs:
  using: composite
  steps:
    - name: Terraform Apply
      uses: xero-internal/github-actions/terraform-apply@v1.0
      with:
        aws_region: ${{ inputs.aws_region}}
        oidc_role: ${{ inputs.oidc_role  }}
        target_role: ${{ inputs.target_role }}
        working_dir: ${{ inputs.working_dir }}
        terraform_backend: environment/${{ inputs.environment }}.backend
        terraform_var_files: environment/${{ inputs.environment }}.tfvars
        role_duration_seconds: 2100 # 35 minutes timeout for deployment
        # for deploy track below inputs are required
        deploytrack_api_token: ${{ inputs.deploy_track_token }}
        component_uuid: ${{ inputs.component_uuid }}
        environment: ${{ inputs.environment }} 
        
    - name: Save Terraform Outputs
      shell: bash
      id: set_output
      working-directory: ${{ inputs.working_dir }}
      run: |
        server_endpoint=$(terraform output -raw endpoint)
        echo "server_endpoint=$server_endpoint" >> "$GITHUB_OUTPUT"