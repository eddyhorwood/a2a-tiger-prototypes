name: Service - Load test
run-name: Service - Load test run by @${{ github.actor }} in ${{ inputs.environment-target }}

on:
  workflow_dispatch:
    inputs:
      environment-target:
        description: "Environment target"
        required: true
        default: uat
        type: choice
        options:
          - uat
          - test

permissions:
  contents: read

jobs:
  get-config:
    name: Get config values
    uses: ./.github/workflows/service-workflow-get-config.yaml

  k6-load-test:
    runs-on: [ self-hosted, linux-al2023, x64, runners-us-west-2 ]
    needs: [ get-config ]
    environment: ${{ inputs.environment-target }}
    steps:
      - name: K6 test
        uses: xero-internal/github-actions/performance-test@v1
        with:
          working_dir: ./projects/service/tests/${{needs.get-config.outputs.service-name-pascal-case}}.LoadTests
          test_path: dist/example.test.js
          k6_flags: -e ENV=${{ inputs.environment-target }} -e K6_CONSOLE_OUTPUT=loadtest.log -e PE_IDENTITY_CLIENT_SECRET=${{ secrets.PE_IDENTITY_CLIENT_SECRET }} -e PR_IDENTITY_CLIENT_SECRET=${{ secrets.PR_IDENTITY_CLIENT_SECRET }} -c projects/service/tests/${{needs.get-config.outputs.service-name-pascal-case}}.LoadTests/src/env/${{ inputs.environment-target }}/config.load.json
          is_ts: true

      - name: upload result data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-data
          path: loadtest.log
