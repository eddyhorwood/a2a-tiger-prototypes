---
x-shared-local:
  <<: &shared-local
    logging:
      driver: "gelf"
      options:
        gelf-address: "udp://127.0.0.1:12201"

include:
  - ../database/docker-compose.yml
  - ../shared/localstack/docker-compose-localstack.yml

services:
  dotnet:
    # Dockerfile location: https://github.com/xero-internal/Accelerators.Docker/tree/main/Dockerfiles/dotnet8/debianNet8
    image: xop-accelerator-framework-docker-common.artifactory.xero-support.com/accelerators-docker/dotnet8/debian-dotnet-8:newest
    volumes:
      - ../shared:/code/shared
      - ../service:/code/service
      - /code/.git
      - /code/infra
    working_dir: /code
    environment:
      Override_DataAccess__PaymentExecutionDB__ConnectionString: "Server=host.docker.internal;Database=payment_execution_db;User Id=payment_execution_user;Password=temp_p@ssw0rd;"

  payment-execution-service:
    build:
      context: ../
      dockerfile: ./service/src/PaymentExecutionService.Api/Dockerfile
      args:
        - GitHash=GUID
        - GitVersion=0.0.0
    ports:
      - ${PAYMENT_EXECUTION_SERVICE_PORT:-5000}:5000
    environment:
      DOTNET_ENVIRONMENT: Development
      Override_Identity__Authority: http://identity-mock:80
      Override_Authorisation__AuthorisationServiceHost: http://auth-service:50051
      Override_ExternalServices__SomeOtherXeroApi__BaseUrl: http://some-other-xero-api:5000
      Override_Serilog__WriteTo__0__Args__serverUrl: http://seq:5341

  identity-mock:
    # Dockerfile location: https://github.com/xero-internal/identity.docker.identity-mock
    image: token-compliance-docker-common.artifactory.xero-support.com/identity-mock:4.2.0@sha256:9cc8ab5a690ab4f53fe34684a57563e27e42f3edd6bfa300e44e76cebf032b98
    environment:
      Identity__ConfigPath: /app/my_config
      Identity__IssuerUri: http://localhost:5003
    ports:
      - 5003:80
    volumes:
      - ./docker/identity-mock/custom_config:/app/my_config
    <<: *shared-local

  auth-service:
    # Dockerfile location: https://github.com/xero-internal/authorisation.service/blob/master/.batect/app/Dockerfile
    image: authorisation-docker-common.artifactory.xero-support.com/authorisation/service:6a8753ed61e3aa4fe5caf9be7687f800b8cf0b70-6715f77be27b30008cc50a3007b55f4cfe7697a1
    depends_on:
      identity-mock:
        condition: service_healthy
    environment:
      IDENTITY_URL: http://identity-mock:80
      FILE_CACHE_PATH: /app/cache
    ports:
      - 50051:50051
    volumes:
      - ./docker/auth-service/cache:/app/cache
      - ./docker/auth-service/namespace:/policy/domain/organisation
    <<: *shared-local

  payment-request-mock:
    image: wiremock/wiremock:3.12.1
    ports:
      - "12111:8080"
    volumes:
      - ./docker/payment-request-mock:/home/wiremock

  stripe-execution-mock:
    image: wiremock/wiremock:3.12.1
    ports:
      - "12112:8080"
    volumes:
      - ./docker/stripe-execution-mock:/home/wiremock

  seq:
    image: docker-hub.artifactory.xero-support.com/datalust/seq:latest
    ports:
      - "5341:80"
    environment:
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
      ACCEPT_EULA: "Y"
    volumes:
      - aggregated-logs:/data

  seq-input-gelf:
    image: docker-hub.artifactory.xero-support.com/datalust/seq-input-gelf:latest
    depends_on:
      - seq
    ports:
      - "12201:12201/udp"
    environment:
      SEQ_ADDRESS: "http://seq:5341"

  k6:
    image: docker-hub.artifactory.xero-support.com/grafana/k6:0.50.0
    network_mode: host
    volumes:
      - ./tests/PaymentExecutionService.LoadTests:/tests/PaymentExecutionService.LoadTests:rw

  megalinter:
    image: docker-hub.artifactory.xero-support.com/oxsecurity/megalinter:v8
    volumes:
      - .:/tmp/lint
    environment:
      - GITHUB_TOKEN

volumes:
  nuget-repo:
    external: false
  maven-repo:
    external: false
  aggregated-logs:
    external: false

networks:
  default:
    name: ${DOCKER_NETWORK_NAME:-payment-execution-service-default}
