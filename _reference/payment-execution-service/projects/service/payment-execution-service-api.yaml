openapi: 3.0.1
info:
  title: Payment Execution Service
  description: The Execution Service is a central data store designed to manage and track execution transactions across multiple payment providers
  contact:
    url: https://app.getcortexapp.com/admin/service?tenantCode=Xero&tag=334db7HzPYMT119B9go9X9/
  version: '1.0'
  x-xero-api-type: Product
servers:
  - url: http://localhost:5000
    description: Local URL
  - url: https://payment-execution.global.xero-uat.com/execution
    description: Uat URL
  - url: https://payment-execution.global.xero.com/execution
    description: Production URL
  - url: https://payment-execution.global.xero-test.com/execution
    description: Test URL
paths:
