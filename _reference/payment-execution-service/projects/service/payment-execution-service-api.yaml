            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
      security:
        - XeroIdentity:
            - xero_collecting-payments-execution_payment-execution-service.dchdelete
  '/v1/payments/payment-requests/{paymentRequestId}/provider-executions/{providerServiceId}/complete':
    post:
      tags:
        - Payments
      operationId: Complete
      parameters:
        - name: paymentRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: providerServiceId
          in: path
          required: true
