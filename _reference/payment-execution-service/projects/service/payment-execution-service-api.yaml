            type: string
            format: uuid
        - name: Xero-Tenant-Id
          in: header
          description: Xero Tenant Id
          required: true
          schema:
            type: string
            format: uuid
        - name: Xero-Correlation-Id
          in: header
          description: Xero Correlation Id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CompletePaymentTransactionRequest'
          text/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CompletePaymentTransactionRequest'
          application/*+json:
            schema:
              allOf:
