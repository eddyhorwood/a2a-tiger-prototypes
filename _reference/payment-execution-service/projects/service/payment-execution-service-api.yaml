  /v1/payments/stripe/submit:
    post:
      tags:
        - SubmitStripe
      operationId: SubmitStripe
      parameters:
        - name: Xero-Tenant-Id
          in: header
          description: Xero Tenant Id
          required: true
          schema:
            type: string
            format: uuid
        - name: Provider-Account-Id
          in: header
          description: Provider Account Id
          required: true
          schema:
            type: string
        - name: Xero-Correlation-Id
          in: header
          description: Xero Correlation Id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SubmitStripeRequest'
          text/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SubmitStripeRequest'
          application/*+json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SubmitStripeRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/SubmitStripePaymentCommandResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitStripePaymentCommandResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/SubmitStripePaymentCommandResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
      security:
        - XeroIdentity:
            - xero_collecting-payments-execution_payment-execution-service.submit
  /healthcheck:
    get:
      tags:
        - Health checks
      operationId: HealthCheck
      parameters:
        - name: X-Secret
          in: header
          description: A secret value known only by the service owners.
          schema:
            type: string
      responses:
        '200':
          description: Healthy
        '503':
          description: Degraded
        '500':
          description: Unhealthy
        '401':
          description: Unauthorized
  /ready:
    get:
      tags:
        - Health checks
      operationId: Ready
      parameters:
        - name: X-Secret
          in: header
          description: A secret value known only by the service owners.
          schema:
            type: string
      responses:
        '200':
          description: Healthy
        '503':
          description: Degraded
        '500':
          description: Unhealthy
        '401':
          description: Unauthorized
  /ping:
    get:
      tags:
