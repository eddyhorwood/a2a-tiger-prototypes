      operationId: GetPaymentTransaction
      parameters:
        - name: paymentRequestId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: Xero-Correlation-Id
          in: header
          description: Xero Correlation Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/GetPaymentTransactionQueryResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentTransactionQueryResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/GetPaymentTransactionQueryResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
