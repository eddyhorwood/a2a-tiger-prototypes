      operationId: Ping
      responses:
        '200':
          description: Healthy
        '503':
          description: Degraded
        '500':
          description: Unhealthy
  /secure-ping:
    get:
      tags:
        - Health checks
      operationId: SecurePing
      responses:
        '200':
          description: Healthy
        '503':
          description: Degraded
        '500':
          description: Unhealthy
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
        - XeroIdentity:
            - xero_collecting-payments-execution_payment-execution-service.read
            - xero_collecting-payments-execution_payment-execution-service.dchdelete
            - xero_collecting-payments-execution_payment-execution-service.submit
            - xero_collecting-payments-execution_payment-execution-service.complete
            - xero_collecting-payments-execution_payment-execution-service.requestcancel
            - xero_collecting-payments-execution_payment-execution-service.readproviderstate
components:
  schemas:
    AbaResponse:
      required:
        - accountNumber
        - bankName
        - routingNumber
      type: object
      properties:
        accountNumber:
          type: string
        bankName:
          type: string
        routingNumber:
          type: string
      additionalProperties: false
    BankTransferInstructionsResponse:
      required:
        - paymentProviderPaymentCurrency
      type: object
      properties:
        financialAddresses:
          allOf:
            - $ref: '#/components/schemas/FinancialAddressesResponse'
          nullable: true
        amount:
          type: integer
          format: int64
        paymentProviderPaymentCurrency:
          type: string
        bankTransferCurrency:
          type: string
          nullable: true
        amountRemaining:
          type: integer
          format: int64
          nullable: true
        reference:
          type: string
          nullable: true
      additionalProperties: false
    CancelPayload:
      required:
        - cancellationReason
      type: object
      properties:
        cancellationReason:
          type: string
      additionalProperties: false
    CompletePaymentTransactionRequest:
      required:
        - eventCreatedDateTime
        - providerType
        - status
      type: object
      properties:
        fee:
          maximum: 2147483647
          minimum: 0
          type: number
          format: double
          nullable: true
        feeCurrency:
          type: string
          nullable: true
        paymentProviderPaymentTransactionId:
          type: string
          description: PaymentIntentIntentId for Stripe
          nullable: true
        paymentProviderPaymentReferenceId:
          type: string
          description: ChargeId for stripe
          nullable: true
        providerType:
          allOf:
            - $ref: '#/components/schemas/ProviderType'
          nullable: true
        status:
          allOf:
            - $ref: '#/components/schemas/TerminalStatus'
          nullable: true
        failureDetails:
          type: string
          nullable: true
        eventCreatedDateTime:
          type: string
          format: date-time
        paymentProviderLastUpdatedAt:
          type: string
          format: date-time
          nullable: true
        cancellationReason:
          type: string
          nullable: true
      additionalProperties: false
    DchDeletePayload:
      required:
        - idToDelete
      type: object
      properties:
        idToDelete:
          type: string
          format: uuid
      additionalProperties: false
    FinancialAddressesResponse:
      type: object
      properties:
        aba:
          allOf:
            - $ref: '#/components/schemas/AbaResponse'
          nullable: true
        swift:
          allOf:
            - $ref: '#/components/schemas/SwiftResponse'
          nullable: true
      additionalProperties: false
    GetPaymentTransactionQueryResponse:
      required:
        - paymentRequestId
        - providerType
        - status
      type: object
      properties:
        paymentTransactionId:
          type: string
          format: uuid
          nullable: true
        paymentRequestId:
          type: string
          format: uuid
        status:
          type: string
        fee:
          type: number
          format: double
          nullable: true
        feeCurrency:
          type: string
          nullable: true
        paymentProviderPaymentReferenceId:
          type: string
          nullable: true
        paymentProviderPaymentTransactionId:
          type: string
          nullable: true
        failureDetails:
          type: string
          nullable: true
        eventCreatedDateTimeUtc:
          type: string
          format: date-time
          nullable: true
        providerServiceId:
          type: string
          format: uuid
          nullable: true
        providerType:
          type: string
        createdUtc:
          type: string
          format: date-time
          nullable: true
        updatedUtc:
          type: string
          format: date-time
          nullable: true
        cancellationReason:
          type: string
          nullable: true
      additionalProperties: false
    GetProviderStateResponse:
      required:
        - paymentProviderPaymentTransactionId
      type: object
      properties:
        paymentProviderStatus:
          allOf:
            - $ref: '#/components/schemas/PaymentProviderStatusResponse'
        paymentProviderPaymentTransactionId:
          type: string
        providerType:
          allOf:
            - $ref: '#/components/schemas/ProviderTypeResponse'
        lastPaymentErrorCode:
          type: string
          nullable: true
        pendingStatusDetails:
          allOf:
            - $ref: '#/components/schemas/PendingStatusDetailsResponse'
          nullable: true
      additionalProperties: false
    MicroDepositVerificationResponse:
      required:
        - hostedVerificationUrl
      type: object
      properties:
        hostedVerificationUrl:
          type: string
        bankAccountLast4:
          type: string
          nullable: true
      additionalProperties: false
    PaymentMethodTypeResponse:
      enum:
        - Card
        - Link
        - CustomerBalance
        - AfterPay
        - AuBecsDebit
        - BacsDebit
        - Klarna
        - UsBankAccount
        - Zip
        - PayTo
        - PayByBank
        - ApplePay
        - GooglePay
      type: string
    PaymentProviderStatusResponse:
      enum:
        - Submitted
        - Processing
        - RequiresAction
        - Terminal
      type: string
    PendingStatusDetailsResponse:
      type: object
      properties:
        paymentMethodType:
          allOf:
            - $ref: '#/components/schemas/PaymentMethodTypeResponse'
        requiresActionType:
          allOf:
            - $ref: '#/components/schemas/RequiresActionTypeResponse'
        hasActionValue:
          type: boolean
        bankTransferInstructions:
          allOf:
            - $ref: '#/components/schemas/BankTransferInstructionsResponse'
          nullable: true
        redirectToUrl:
          allOf:
            - $ref: '#/components/schemas/RedirectToUrlResponse'
          nullable: true
        microDepositVerification:
          allOf:
            - $ref: '#/components/schemas/MicroDepositVerificationResponse'
          nullable: true
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: { }
    ProviderType:
      enum:
        - Stripe
        - Paypal
        - GoCardless
      type: string
    ProviderTypeResponse:
      enum:
        - Stripe
        - Paypal
        - GoCardless
      type: string
    RedirectToUrlResponse:
      type: object
      properties:
        redirectUrl:
          type: string
          nullable: true
      additionalProperties: false
    RequestCancelPayload:
      required:
        - cancellationReason
      type: object
      properties:
        cancellationReason:
          minLength: 1
          type: string
      additionalProperties: false
    RequiresActionTypeResponse:
      enum:
        - BankTransferInstructions
        - RedirectToUrl
        - MicrodepositVerification
        - PayToAuthorization
        - Unknown
        - None
      type: string
    SubmitStripePaymentCommandResponse:
      required:
        - clientSecret
        - paymentIntentId
      type: object
      properties:
        paymentIntentId:
          type: string
        clientSecret:
          type: string
      additionalProperties: false
    SubmitStripeRequest:
      required:
        - paymentRequestId
      type: object
      properties:
        paymentRequestId:
          type: string
          format: uuid
        paymentMethodsMadeAvailable:
          maxItems: 999
          type: array
          items:
            type: string
          nullable: true
        paymentMethodId:
          type: string
          nullable: true
      additionalProperties: false
    SwiftResponse:
      required:
        - swiftCode
      type: object
      properties:
        swiftCode:
          type: string
      additionalProperties: false
    TerminalStatus:
      enum:
        - Succeeded
        - Failed
        - Cancelled
      type: string
  securitySchemes:
    XeroIdentity:
      type: oauth2
      description: Xero Identity Security Scheme
      flows:
        clientCredentials:
          tokenUrl: https://identity.xero.com/connect/token
