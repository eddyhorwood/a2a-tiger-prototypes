        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
      security:
        - XeroIdentity:
            - xero_collecting-payments-execution_payment-execution-service.requestcancel
  '/v1/payments/cancel/{paymentRequestId}':
    post:
      tags:
        - Payments
      operationId: Cancel
      parameters:
        - name: paymentRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Xero-Tenant-Id
          in: header
          description: Xero Tenant Id
          required: true
          schema:
            type: string
            format: uuid
        - name: Xero-Correlation-Id
          in: header
          description: Xero Correlation Id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CancelPayload'
          text/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CancelPayload'
          application/*+json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CancelPayload'
        required: true
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
