---
include:
  - ../shared/localstack/docker-compose-localstack.yml
  - ../database/docker-compose.yml

services:
  dotnet:
    # Dockerfile location: https://github.com/xero-internal/Accelerators.Docker/tree/main/Dockerfiles/dotnet8/debianNet8
    image: xop-accelerator-framework-docker-common.artifactory.xero-support.com/accelerators-docker/dotnet8/debian-dotnet-8:newest
    volumes:
      - ./:/code
      - /code/.git
      - /code/infra
    working_dir: /code

  payment-execution-worker:
    build:
      context: ../
      dockerfile: ./worker/src/PaymentExecutionWorker.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      Override_Serilog__WriteTo__0__Args__serverUrl: http://seq:5341

  identity-mock:
    # Dockerfile location: https://github.com/xero-internal/identity.docker.identity-mock
    image: token-compliance-docker-common.artifactory.xero-support.com/identity-mock:4.2.0@sha256:9cc8ab5a690ab4f53fe34684a57563e27e42f3edd6bfa300e44e76cebf032b98
    environment:
      Identity__ConfigPath: /app/my_config
      Identity__IssuerUri: http://localhost:5003
    ports:
      - 5003:80
    volumes:
      - ./docker/identity-mock/custom_config:/app/my_config

  payment-request-mock:
    image: wiremock/wiremock:3.12.1
    ports:
      - "12111:8080"
    volumes:
      - ./docker/payment-request-mock:/home/wiremock

  megalinter:
    image: docker-hub.artifactory.xero-support.com/oxsecurity/megalinter:v8
    volumes:
      - .:/tmp/lint
    environment:
      - GITHUB_TOKEN

  seq:
    image: docker-hub.artifactory.xero-support.com/datalust/seq:latest
    ports:
      - "5341:80"
    environment:
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
      ACCEPT_EULA: "Y"
    volumes:
      - aggregated-logs:/data

  seq-input-gelf:
    image: docker-hub.artifactory.xero-support.com/datalust/seq-input-gelf:latest
    depends_on:
      - seq
    ports:
      - "12201:12201/udp"
    environment:
      SEQ_ADDRESS: "http://seq:5341"

volumes:
  nuget-repo:
    external: false
  maven-repo:
    external: false
  aggregated-logs:
    external: false

networks:
  default:
    name: ${DOCKER_NETWORK_NAME:-payment-execution-worker-default}
