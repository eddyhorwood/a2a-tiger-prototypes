---
Version: "2012-10-17"
Statement:
  - Effect: Allow
    Action:
      - cloudformation:*
    Resource: arn:aws:cloudformation:${region}:${aws_account_id}:stack/${service_name}-tf-backend-${environment}/*
  - Effect: Allow
    Action:
      - kms:Encrypt
      - kms:Decrypt
      - kms:ReEncrypt*
      - kms:GenerateDataKey*
      - kms:DescribeKey
      - kms:ListAliases
    Resource: ${infra_kms_key_arn}
  - Effect: Allow
    Action:
      - dynamodb:DescribeTable
      - dynamodb:PutItem
      - dynamodb:GetItem
      - dynamodb:DeleteItem
    Resource: arn:aws:dynamodb:${region}:${aws_account_id}:table/${service_name}-tf-state-lock-${environment}
  - Effect: Allow
    Action:
      - s3:ListBucket
    Resource: arn:aws:s3:::${service_name}-tf-state-${environment}
  - Effect: Allow
    Action:
      - s3:GetObject
      - s3:PutObject
    Resource: arn:aws:s3:::${service_name}-tf-state-${environment}/*
