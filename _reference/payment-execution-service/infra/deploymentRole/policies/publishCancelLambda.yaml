---
Version: "2012-10-17"
Statement:
  - Sid: "UploadLambdaDeploymentPackagesToS3"
    Effect: Allow
    Action:
      - "s3:PutObject"
      - "s3:GetObject"
      - "s3:ListBucket"
      - "s3:GetObjectTagging"
      - "s3:PutObjectTagging"
      - "s3:ListBucketVersions"
      - "s3:GetBucketLocation"
      - "s3:AbortMultipartUpload"
      - "s3:PutObjectAcl"
      - "s3:DeleteObject"
      - "s3:DeleteObjectVersion"
    Resource:
      - arn:aws:s3:::${service_name}-artifacts-${environment}
      - arn:aws:s3:::${service_name}-artifacts-${environment}/*

  - Sid: "ManageVpcNetworkInterfacesForLambda"
    Effect: Allow
    Action:
      - "ec2:CreateSecurityGroup"
      - "ec2:DeleteSecurityGroup"
      - "ec2:DescribeSecurityGroups"
      - "ec2:AuthorizeSecurityGroupIngress"
      - "ec2:AuthorizeSecurityGroupEgress"
      - "ec2:RevokeSecurityGroupIngress"
      - "ec2:RevokeSecurityGroupEgress"
      - "ec2:DescribeSecurityGroupRules"
      - "ec2:DescribeSubnets"
      - "ec2:DescribeVpcs"
      - "ec2:CreateNetworkInterface"
      - "ec2:DescribeNetworkInterfaces"
      - "ec2:DeleteNetworkInterface"
      - "ec2:CreateTags"
    Resource:
      - "*"

  - Sid: "CreateUpdateAndManageLambdaFunctions"
    Effect: Allow
    Action:
      - "lambda:AddPermission"
      - "lambda:GetFunctionConfiguration"
      - "lambda:CreateFunction"
      - "lambda:UpdateFunctionCode"
      - "lambda:UpdateFunctionConfiguration"
      - "lambda:PublishVersion"
      - "lambda:GetFunction"
      - "lambda:GetPolicy"
      - "lambda:ListVersionsByFunction"
      - "lambda:DeleteFunction"
      - "lambda:ListFunctions"
      - "lambda:GetFunctionCodeSigningConfig"
      - "lambda:TagResource"
      - "lambda:CreateEventSourceMapping"
      - "lambda:UpdateEventSourceMapping"
      - "lambda:DeleteEventSourceMapping"
      - "lambda:PutFunctionConcurrency"
      - "lambda:RemovePermission"
      - "lambda:GetEventSourceMapping"
    Resource:
      - "arn:aws:lambda:${region}:${aws_account_id}:*"

  - Sid: "ReadLambdaEventSourceMappings"
    Effect: Allow
    Action:
      - "lambda:GetEventSourceMapping"
      - "lambda:ListEventSourceMappings"
    Resource:
      - "*"

  - Sid: "AccessDefaultKmsKeyNeededForS3Bucket"
    Effect: Allow
    Action:
      - kms:DescribeKey
    Resource:
      - ${default_kms_key_arn}
        
  - Sid: "ManageCloudWatchLogsForLambdaExecution"
    Effect: Allow
    Action:
      - "logs:CreateLogGroup"
      - "logs:CreateLogStream"
      - "logs:PutLogEvents"
      - "logs:DescribeLogGroups"
      - "logs:DescribeLogStreams"
      - "logs:PutSubscriptionFilter"
      - "logs:DescribeSubscriptionFilters"
      - "logs:ListTagsLogGroup"
      - "logs:PutRetentionPolicy"
      - "logs:DeleteLogGroup"
      - "logs:TagLogGroup"
    Resource:
      - "arn:aws:logs:*:*:*"

  - Sid: "PassRoleToLambdaExecution"
    Effect: Allow
    Action:
      - "iam:PassRole"
    Resource:
      - arn:aws:iam::${aws_account_id}:role/lambda-execution-${environment}-cancel-execution-lambda
        
  - Sid: "GetIamRoleForLambdaExecution"
    Effect: Allow
    Action:
      - "iam:GetRole"
    Resource:
      - arn:aws:iam::${aws_account_id}:role/lambda-execution-${environment}-cancel-execution-lambda
